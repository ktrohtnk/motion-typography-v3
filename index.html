<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Typography Studio v3</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Abril+Fatface&family=Bebas+Neue&family=Bungee+Shade&family=Creepster&family=Inter:wght@400;900&family=Monoton&family=Montserrat:wght@900&family=Permanent+Marker&family=Press+Start+2P&family=Righteous&family=Rubik+Pixels&family=Silkscreen&family=Space+Mono:wght@700&family=VT323&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Barlow+Condensed:wght@900&family=Boogaloo&family=Bungee+Shade&family=Creepster&family=Ewert&family=Finger+Paint&family=Fjalla+One&family=Fredoka+One&family=Lilita+One&family=Lobster&family=Luckiest+Guy&family=Metal+Mania&family=Nosifer&family=Oswald:wght@700&family=Paytone+One&family=Permanent+Marker&family=Playfair+Display&family=Rock+Salt&family=Rye&family=Sancreek&family=Six+Caps&family=Ultra&family=Vast+Shadow&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Pixelify+Sans&family=Black+Ops+One&family=Bungee&family=Rubik+Glitch&family=Nabla&family=Pacifico&family=Dancing+Script:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- Load libraries via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-psd/dist/bundle.js"></script>
</head>
<body>
    <div id="app">
        <!-- Control Panel -->
        <aside class="sidebar">
            <div class="header-row">
                <h1 class="logo">MOTION STUDIO</h1>
                <button id="resetAllBtn" class="btn btn-black">RESET ALL</button>
            </div>
            
            <div class="section-label">INPUT SOURCE</div>

            <div class="control-group">
                <label>TEXT INPUT</label>
                <textarea id="textInput" rows="3" style="font-size: 16px;">MOTION
TYPOGRAPHY</textarea>
            </div>

            <div class="control-group">
                <label>FONT FAMILY</label>
                <select id="fontSelect">
                    <option value='900 "Inter", sans-serif' selected>Inter (Black)</option>
                    <option value='400 "Anton", sans-serif'>Anton (Tall)</option>
                    <option value='900 "Montserrat", sans-serif'>Montserrat</option>
                    <option value='700 "Space Mono", monospace'>Space Mono</option>
                    <option value='700 "Bebas Neue", cursive'>Bebas Neue</option>
                    <option value='400 "Righteous", cursive'>Righteous</option>
                    <option value='400 "Permanent Marker", cursive'>Permanent Marker</option>
                    <option value='400 "Creepster", cursive'>Creepster</option>
                    <option value='400 "Press Start 2P", cursive'>Press Start 2P</option>
                    <option value='400 "VT323", monospace'>VT323 (Terminal)</option>
                    <option value='400 "Rubik Pixels", cursive'>Rubik Pixels</option>
                    <option value='400 "Rubik Glitch", cursive'>Rubik Glitch</option>
                    <option value='400 "Silkscreen", cursive'>Silkscreen</option>
                    <option value='400 "Lobster", cursive'>Lobster</option>
                </select>
                <div class="btn-row" style="margin-top: 4px;">
                    <button id="syncFontsBtn" class="btn secondary">SYNC MAC FONTS</button>
                    <label class="btn secondary file-upload-btn">
                        UPLOAD FONT...
                        <input type="file" id="fontUpload" accept=".ttf,.otf,.woff,.woff2" style="display: none;">
                    </label>
                </div>
            </div>

            <div class="control-group" style="margin-top: 8px;">
                <label>LOAD PSD FILE</label>
                <div class="flex-row" style="gap: 8px; align-items: center;">
                    <input type="file" id="psdInput" accept=".psd" class="flex-1">
                    <button id="applyPsdBtn" class="btn secondary" style="padding: 4px 12px;">APPLY</button>
                </div>
                <div class="flex-row" style="margin-top: 4px; gap: 8px;">
                    <div class="control-group flex-1">
                        <label>X</label>
                        <input type="range" id="psdX" min="-1000" max="1000" value="0">
                    </div>
                    <div class="control-group flex-1">
                        <label>Y</label>
                        <input type="range" id="psdY" min="-1000" max="1000" value="0">
                    </div>
                    <div class="control-group flex-1">
                        <label>SCALE</label>
                        <input type="range" id="psdScale" min="0.1" max="5" step="0.1" value="1">
                    </div>
                </div>
            </div>

            <div class="section-label">TYPOGRAPHY</div>
            <div class="flex-row">
                <div class="control-group" style="width: 50px;">
                    <label>TEXT</label>
                    <input type="color" id="colorInput" value="#FFFFFF">
                </div>
                <div class="control-group" style="width: 50px;">
                    <label>BG</label>
                    <input type="color" id="bgColorInput" value="#000000">
                </div>
                <div class="control-group" style="width: 60px;">
                    <label>TRANS BG</label>
                    <input type="checkbox" id="transparentBgToggle" style="margin-top: 8px;">
                </div>
                <div class="control-group" style="width: 80px;">
                    <label>GREEN SCRN</label>
                    <button id="greenScreenBtn" class="btn secondary" style="padding: 4px; font-size: 10px;">FOR iPHONE</button>
                </div>
                <div class="control-group flex-1">
                    <label>SIZE (<span id="sizeBox">140</span>)</label>
                    <input type="range" id="sizeSlider" min="20" max="400" value="140">
                </div>
            </div>

            <div class="flex-row">
                <div class="control-group flex-1">
                    <label>KERNING (<span id="kerningBox">0</span>)</label>
                    <input type="range" id="kerningSlider" min="-50" max="300" value="0">
                </div>
                <div class="control-group flex-1">
                    <label>LINE HEIGHT (<span id="lineHeightBox">1.1</span>)</label>
                    <input type="range" id="lineHeightSlider" min="0.5" max="3" step="0.1" value="1.1">
                </div>
            </div>

            <div class="control-group">
                <label>OUTLINE SETTINGS</label>
                <div class="btn-row">
                    <button id="outlineOnlyBtn" class="btn toggle-btn">OUTLINE ONLY</button>
                    <button id="mergeOverlapBtn" class="btn toggle-btn">MERGE OVERLAP</button>
                </div>
                <div class="flex-row" style="margin-top: 4px;">
                    <label style="width: 40px;">WIDTH</label>
                    <input type="range" id="outlineWidthSlider" min="1" max="40" value="5" class="flex-1">
                    <label style="width: 20px; text-align: right;" id="outlineWidthBox">5</label>
                </div>
            </div>

            <div class="section-label">MOTION CONTROLS</div>

            <div class="control-group" style="margin-bottom: 8px;">
                <label>FRAME RATE (FPS)</label>
                <select id="fpsSelect">
                    <option value="60">60 fps (Smooth)</option>
                    <option value="30">30 fps</option>
                    <option value="24">24 fps (Cinema)</option>
                    <option value="12">12 fps (Animation)</option>
                    <option value="5" selected>5 fps (Choppy)</option>
                </select>
            </div>
            
            <div class="flex-row">
                <div class="control-group flex-1">
                    <label>GLOBAL SPIN (<span id="globalSpinVal">0</span>)</label>
                    <input type="range" id="globalSpin" min="-360" max="360" value="0">
                </div>
                <div class="control-group flex-1">
                    <label>CHAR SPIN (<span id="charSpinVal">0</span>)</label>
                    <input type="range" id="charSpin" min="-360" max="360" value="0">
                </div>
            </div>

            <div class="flex-row">
                <div class="control-group flex-1">
                    <label>JITTER (<span id="jitterVal">0</span>)</label>
                    <input type="range" id="jitterSlider" min="0" max="50" value="0">
                </div>
                <div class="control-group flex-1">
                    <label>JITTER AMOUNT (<span id="jitterAmountVal">5</span>)</label>
                    <input type="range" id="jitterAmountSlider" min="0" max="50" value="5">
                </div>
            </div>

            <div class="control-group" style="margin-top: 8px;">
                <label>SLIDE ANIMATION</label>
                <select id="slideAnimationSelect">
                    <option value="none" selected>None</option>
                    <option value="continuous">Continuous (L to R)</option>
                    <option value="right-center-right">Right &rarr; Center &rarr; Right</option>
                    <option value="left-center-left">Left &rarr; Center &rarr; Left</option>
                    <option value="right-center-left">Right &rarr; Center &rarr; Left</option>
                    <option value="left-center-right">Left &rarr; Center &rarr; Right</option>
                </select>
            </div>

            <div class="flex-row" style="margin-top: 8px;">
                <div class="control-group flex-1">
                    <label>MOVE (S): <span id="moveVal">0.8</span></label>
                    <input type="range" id="moveSlider" min="0.1" max="3.0" step="0.1" value="0.8">
                </div>
                <div class="control-group flex-1">
                    <label>PAUSE (S): <span id="pauseVal">1.5</span></label>
                    <input type="range" id="pauseSlider" min="0" max="5.0" step="0.1" value="1.5">
                </div>
            </div>

            <div class="toggle-row">
                <label>INERTIA / BOUNCE</label>
                <div class="toggle-controls">
                    <input type="range" id="inertiaSlider" min="0" max="3.0" step="0.1" value="1.5" style="width: 60px;">
                    <label class="switch"><input type="checkbox" id="inertiaToggle" checked><span class="slider"></span></label>
                </div>
            </div>

            <div class="section-label">EFFECTS</div>

            <div class="toggle-row">
                <label>FLUXUS FONT SWAP</label>
                <div class="toggle-controls">
                    <select id="fluxusMode" style="width: auto; padding: 4px 24px 4px 8px; font-size: 11px;">
                        <option value="char">Per Character</option>
                        <option value="word">Per Word</option>
                        <option value="global">All Same</option>
                    </select>
                    <label class="switch"><input type="checkbox" id="fluxusToggle"><span class="slider round"></span></label>
                </div>
            </div>

            <div class="toggle-row">
                <label>GLITCH NOISE</label>
                <div class="toggle-controls">
                    <input type="range" id="glitchIntensity" min="0" max="100" value="50" style="width: 80px;">
                    <span id="glitchIntensityVal" style="font-size: 10px; width: 20px; text-align: right; display: inline-block; margin-right: 4px; color: #111111; font-weight: bold;">50</span>
                    <label class="switch"><input type="checkbox" id="glitchToggle"><span class="slider round"></span></label>
                </div>
            </div>
            
            <div class="toggle-row">
                <label>RGB SPLIT</label>
                <div class="toggle-controls">
                    <input type="range" id="rgbSplitDistanceSlider" min="0" max="50" value="6" style="width: 80px;">
                    <span id="rgbSplitDistVal" style="font-size: 10px; width: 20px; text-align: right; display: inline-block; margin-right: 4px; color: #111111; font-weight: bold;">6</span>
                    <label class="switch"><input type="checkbox" id="rgbSplitToggle"><span class="slider round"></span></label>
                </div>
            </div>

            <div class="toggle-row" style="flex-direction: column; align-items: stretch; gap: 8px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label>SIZE CHAOS</label>
                    <label class="switch"><input type="checkbox" id="chaosToggle"><span class="slider round"></span></label>
                </div>
                
                <div id="chaosControls" style="display: flex; flex-direction: column; gap: 8px; opacity: 0.5; pointer-events: none;">
                    <!-- Size Chaos controls (always visible when ON) -->
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <select id="chaosMode" style="width: 100px; font-size:9px; padding: 4px;">
                            <option value="char">Per Character</option>
                            <option value="fontswap">Font Swap</option>
                        </select>
                        <div style="display:flex; flex-direction:column; align-items:flex-end;">
                            <div style="display:flex; align-items:center;">
                                <label style="font-size: 9px; width: 25px;">INT</label>
                                <input type="range" id="chaosIntensity" min="1" max="100" value="50" style="width: 70px;">
                                <span id="chaosIntensityVal" style="font-size: 9px; width: 18px; text-align: right; display: inline-block; margin-left: 2px; color: #111111; font-weight: bold;">50</span>
                            </div>
                            <div style="display:flex; align-items:center; margin-top:2px;">
                                <label style="font-size: 9px; width: 25px;">MIX</label>
                                <input type="range" id="chaosMix" min="0" max="100" value="30" style="width: 70px;">
                                <span id="chaosMixVal" style="font-size: 9px; width: 18px; text-align: right; display: inline-block; margin-left: 2px; color: #111111; font-weight: bold;">30</span>
                            </div>
                        </div>
                    </div>


                    <!-- GLITCH POP B sub-toggle -->
                    <div style="display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #ccc; padding-top: 6px;">
                        <label style="font-size: 10px; font-weight: bold;">GLITCH POP B (Mosaic Bug)</label>
                        <label class="switch"><input type="checkbox" id="glitchPopBToggle"><span class="slider round"></span></label>
                    </div>
                    <div id="panelChaosGlitchB" style="display: none; align-items: center; justify-content: space-between;">
                        <label style="font-size: 9px; color: #666; width: 100px;">MOSAIC NOISE</label>
                        <div style="display:flex; flex-direction:column; align-items:flex-end;">
                            <div style="display:flex; align-items:center;">
                                <label style="font-size: 9px; width: 25px;">FRQ</label>
                                <input type="range" id="glitchPopBIntensitySlider" min="0" max="100" value="50" style="width: 70px;">
                                <span id="glitchPopBIntensityVal" style="font-size: 9px; width: 18px; text-align: right; display: inline-block; margin-left: 2px; color: #111111; font-weight: bold;">50</span>
                            </div>
                            <div style="display:flex; align-items:center; margin-top:2px;">
                                <label style="font-size: 9px; width: 25px;">PIX</label>
                                <input type="range" id="glitchPopBPixelSlider" min="2" max="16" value="8" style="width: 70px;">
                                <span id="glitchPopBPixelVal" style="font-size: 9px; width: 18px; text-align: right; display: inline-block; margin-left: 2px; color: #111111; font-weight: bold;">8</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="toggle-row">
                <label>FILM DUST & LINT</label>
                <label class="switch"><input type="checkbox" id="dustToggle"><span class="slider round green"></span></label>
            </div>
            <div class="control-group">
                <div class="flex-row">
                    <label style="width: 90px;">DENSITY (<span id="dustDensityVal">20</span>)</label>
                    <input type="range" id="dustDensitySlider" min="1" max="100" value="20" class="flex-1">
                </div>
                <div class="flex-row" style="margin-top: 4px;">
                    <label style="width: 90px;">SIZE (<span id="dustSizeVal">1.0</span>)</label>
                    <input type="range" id="dustSizeSlider" min="0.1" max="10.0" step="0.1" value="1.0" class="flex-1">
                </div>
            </div>
            
            <div class="toggle-row">
                <label>3D DEPTH</label>
                <label class="switch"><input type="checkbox" id="depthToggle"><span class="slider round green"></span></label>
            </div>

            <div class="control-group" style="margin-top: 16px;">
                <button id="triggerSmokeBtn" class="btn btn-black" style="font-size: 16px; padding: 16px;">TRIGGER SMOKE / DISSIPATE</button>
                <select id="smokeTypeSelect" style="margin-top: 4px;">
                    <option value="water">Water Grid</option>
                    <option value="sand">Sand Crumble (Thanos Snap)</option>
                    <option value="pop_burst">Pop Smoke (Burst L/R)</option>
                    <option value="pop_center">Pop Smoke (Center)</option>
                </select>
            </div>

            <div class="section-label">EXPORT (1080x1920)</div>
            <div class="btn-row">
                <button id="recordBtn" class="btn primary-cyan">START RECORDING</button>
                <button id="stopRecordBtn" class="btn primary-orange">STOP & DOWNLOAD</button>
            </div>
        </aside>

        <!-- Canvas Area -->
        <main class="canvas-container">
            <canvas id="mainCanvas" width="1080" height="1920"></canvas>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
